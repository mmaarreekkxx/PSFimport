<!DOCTYPE html>
<html lang="pl" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Import PSF - Analiza Danych</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{}}};</script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.4.2/js/dataTables.buttons.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/pdfmake.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/vfs_fonts.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.html5.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.print.min.js"></script>

  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    /* Scrollbar */
    .group-scroll::-webkit-scrollbar { width: 6px; }
    .group-scroll::-webkit-scrollbar-thumb { background: rgba(100,100,100,0.5); border-radius: 10px; }
    /* Loader */
    .spin-loader { border-radius:50%;width:24px;height:24px;border:3px solid rgba(59,130,246,0.2);border-top-color:#3b82f6;animation:spinner 1s linear infinite; }
    @keyframes spinner{to{transform:rotate(360deg)}}
    /* Glass effect */
    .glass-effect {
      backdrop-filter: blur(8px);
      background-color: rgba(255, 255, 255, 0.7);
    }
    .dark .glass-effect {
      background-color: rgba(31, 41, 55, 0.7);
    }
  </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 font-inter antialiased min-h-full">
  <div class="w-full">
    <div id="alertContainer" class="fixed top-4 right-4 z-50 w-full max-w-sm hidden"></div>
    <!-- Header -->
    <header class="flex flex-wrap justify-between items-center glass-effect shadow py-2 px-4 border-b border-gray-200 dark:border-gray-700 sticky top-0 z-10">
      <div class="flex items-center">
        <i class="fas fa-file-import text-xl text-blue-600"></i>
        <h1 class="ml-2 text-lg font-bold">Import PSF</h1>
        <span id="fileCountBadge" class="ml-2 bg-blue-500 text-white text-xs px-2 py-0.5 rounded-full hidden"></span>
      </div>
      <div class="flex items-center space-x-2 mt-2 sm:mt-0">
        <!-- Dark Mode Toggle - poprawiona wersja -->
<div class="flex items-center">
  <label class="relative inline-flex items-center cursor-pointer">
    <input type="checkbox" id="darkModeToggle" class="sr-only" />
    <div class="px-3 py-1.5 bg-blue-500 hover:bg-blue-600 text-white rounded-md shadow transition text-sm flex items-center">
      <i class="fas fa-moon"></i>
      <span class="ml-2 text-xs">Tryb ciemny</span>
    </div>
  </label>
</div>
        <button id="clearDataButton" class="flex items-center px-3 py-1.5 bg-blue-500 hover:bg-blue-600 text-white rounded-md shadow transition text-sm">
          <i class="fas fa-trash"></i>
        </button>
        <button id="printButton" class="flex items-center px-3 py-1.5 bg-blue-500 hover:bg-blue-600 text-white rounded-md shadow transition text-sm">
          <i class="fas fa-print"></i>
        </button>
      </div>
    </header>

    <!-- Import Section -->
    <section class="w-full bg-white dark:bg-gray-800 shadow mt-4 py-4 px-4 rounded-lg border border-gray-200 dark:border-gray-700">
      <h2 class="flex items-center text-lg font-semibold mb-2"><i class="fas fa-upload mr-2 text-blue-500"></i>Import plików</h2>
      <div id="dropzone" class="border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-lg p-4 text-center hover:border-blue-500 transition cursor-pointer">
        <i class="fas fa-cloud-upload-alt text-2xl text-gray-400 mb-1"></i>
        <p class="text-xs text-gray-600 dark:text-gray-400">Przeciągnij i upuść lub <span class="text-blue-600 dark:text-blue-400 font-medium">kliknij</span></p>
        <p class="text-2xs text-gray-500 dark:text-gray-500 mt-1">CSV, XLSX, XLS</p>
        <input type="file" id="fileInput" multiple accept=".csv,.xlsx,.xls" class="hidden">
      </div>
      <div id="loadingSpinner" class="flex items-center justify-center mt-2 hidden"><div class="spin-loader mr-1"></div><span class="text-2xs text-gray-600 dark:text-gray-400">Przetwarzanie...</span></div>
    </section>

    <!-- Analysis & Summary -->
    <section class="w-full flex flex-col lg:flex-row lg:space-x-4 mt-4">
      <div class="flex-1 bg-white dark:bg-gray-800 shadow p-3 rounded-lg border border-gray-200 dark:border-gray-700">
        <div class="flex justify-between items-center mb-2"><h2 class="flex items-center text-lg font-semibold"><i class="fas fa-chart-pie mr-1 text-green-500"></i>Analiza wizualna</h2><select id="chartTypeSelect" class="px-2 py-0.5 sm:px-3 sm:py-1 border border-gray-300 dark:border-gray-600 rounded bg-white dark:bg-gray-700 text-xs sm:text-sm focus:outline-none"><option value="donut">Pierścieniowy</option><option value="pie">Kołowy</option><option value="bar">Słupkowy</option><option value="line">Liniowy</option><option value="area">Obszarowy</option><option value="radialBar">Promieniowy</option><option value="heatmap">Mapa cieplna</option><option value="treemap">Mapa drzewa</option></select></div>
        <div id="pieChart" class="w-full h-48"></div>
      </div>
      <div class="w-full lg:w-1/3 bg-white dark:bg-gray-800 shadow p-3 rounded-lg border border-gray-200 dark:border-gray-700 mt-4 lg:mt-0">
        <h2 class="flex items-center text-lg font-semibold mb-2"><i class="fas fa-calculator mr-1 text-purple-500"></i>Podsumowanie</h2>
        <div class="space-y-2 text-xs sm:text-sm"><div class="flex justify-between items-center bg-blue-50 dark:bg-blue-900/30 p-2 rounded-lg"><span>Netto:</span><span id="totalNetto" class="font-bold text-blue-600">0,00 zł</span></div><div class="flex justify-between items-center bg-green-50 dark:bg-green-900/30 p-2 rounded-lg"><span>VAT:</span><span id="totalVAT" class="font-bold text-green-600">0,00 zł</span></div><div class="flex justify-between items-center bg-purple-50 dark:bg-purple-900/30 p-2 rounded-lg"><span>Brutto:</span><span id="totalBrutto" class="font-bold text-purple-600">0,00 zł</span></div></div>
      </div>
    </section>

    <!-- Grouping -->
    <section class="w-full bg-white dark:bg-gray-800 shadow mt-4 py-4 px-4 rounded-lg border border-gray-200 dark:border-gray-700">
      <div class="flex justify-between items-center mb-3"><h2 class="flex items-center text-lg font-semibold"><i class="fas fa-layer-group mr-1 text-yellow-500"></i>Grupowanie</h2><input id="groupSearch" type="text" placeholder="Szukaj w grupach..." class="px-2 py-0.5 sm:px-3 sm:py-1 border border-gray-300 dark:border-gray-600 rounded text-xs sm:text-sm w-1/3 focus:outline-none"></div>
      <div class="flex flex-wrap gap-2 mb-3">
        <button id="expandAllGroups" class="px-2 py-0.5 sm:px-3 sm:py-1 bg-blue-500 hover:bg-blue-600 text-white rounded-md shadow text-xs sm:text-sm">Rozwiń wszystkie</button>
        <button id="collapseAllGroups" class="px-2 py-0.5 sm:px-3 sm:py-1 bg-blue-500 hover:bg-blue-600 text-white rounded-md shadow text-xs sm:text-sm">Zwiń wszystkie</button>
        <button id="groupByProduct" class="px-2 py-0.5 sm:px-3 sm:py-1 bg-blue-500 hover:bg-blue-600 text-white rounded-md shadow text-xs sm:text-sm">Produkt</button>
        <button id="groupByRegistration" class="px-2 py-0.5 sm:px-3 sm:py-1 bg-blue-500 hover:bg-blue-600 text-white rounded-md shadow text-xs sm:text-sm">Rejestracja</button>
      </div>
      <div id="productGroupsSummary" class="max-h-[60vh] overflow-y-auto group-scroll space-y-3"></div>
    </section>

    <!-- Data Table -->
    <section class="w-full bg-white dark:bg-gray-800 shadow mt-4 py-4 px-4 rounded-lg border border-gray-200 dark:border-gray-700">
      <div class="flex justify-between items-center mb-3"><h2 class="flex items-center text-lg font-semibold"><i class="fas fa-table mr-1 text-indigo-500"></i>Tabela danych</h2><div class="flex items-center space-x-2"><input id="tableSearch" type="text" placeholder="Szukaj w tabeli..." class="px-2 py-0.5 sm:px-3 sm:py-1 border border-gray-300 dark:border-gray-600 rounded text-xs sm:text-sm focus:outline-none"><div class="relative"><button id="exportButton" class="px-2 py-0.5 sm:px-3 sm:py-1 bg-blue-500 hover:bg-blue-600 text-white rounded-md shadow text-xs sm:text-sm">Eksport</button><div id="exportDropdown" class="hidden absolute right-0 mt-1 w-36 bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded shadow"><button id="exportExcel" class="block w-full text-left px-2 py-0.5 hover:bg-gray-100 dark:hover:bg-gray-600 text-xs sm:text-sm">Excel (.xlsx)</button><button id="exportPDF" class="block w-full text-left px-2 py-0.5 hover:bg-gray-100 dark:hover:bg-gray-600 text-xs sm:text-sm">PDF</button><button id="exportCSV" class="block w-full text-left px-2 py-0.5 hover:bg-gray-100 dark:hover:bg-gray-600 text-xs sm:text-sm">CSV</button></div></div></div></div>
      <div class="overflow-x-auto">
        <table id="dataTable" class="min-w-full table-auto text-xs sm:text-sm leading-snug divide-y divide-gray-200 dark:divide-gray-700"></table>
      </div>
    </section>
  </div>
  
  
    <script>
"use strict";
$(document).ready(function() {
  const GROUP_ROW_CHUNK = 250;
  
  // Utility functions
  const debounce = (fn, delay) => {
    let timeout;
    return (...args) => {
      clearTimeout(timeout);
      timeout = setTimeout(() => fn.apply(this, args), delay);
    };
  };
  
  const getTextColorClass = code => {
    const colorClass = CONFIG.produktKodyColors[code] || CONFIG.produktKodyColors[''];
    const match = colorClass.match(/(text-[^\s]+)/);
    return match ? match[1] : "";
  };
  
  const formatDateToYYYYMMDD = date => {
    let d = date instanceof Date ? date : new Date(date);
    if(isNaN(d)) return date;
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  };
  
  const formatAmount = amt => new Intl.NumberFormat('pl-PL', { 
    minimumFractionDigits: 2, 
    maximumFractionDigits: 2, 
    style: 'currency', 
    currency: 'PLN' 
  }).format(parseFloat(amt) || 0);
  
  const formatNumber = num => new Intl.NumberFormat('pl-PL', { 
    minimumFractionDigits: 2, 
    maximumFractionDigits: 2 
  }).format(parseFloat(num) || 0);
  
  const mapRegistrationNumber = nrRej => {
    if (!nrRej) return nrRej;
    const trimmed = nrRej.toString().trim();
    return CONFIG.nrRejMapping[trimmed] || trimmed;
  };
  
  // Application state
  let state = {
    data: [],
    importedFiles: [],
    summary: { totalNetto: 0, totalVAT: 0, totalBrutto: 0, productGroups: {} },
    settings: {
      darkMode: false,
      defaultExportFormat: 'xlsx',
      rowsPerPage: 25,
      groupBy: 'IMPORTKODPRODUKTU',
      chartType: 'donut'
    },
    charts: { pie: null },
    dataTable: null
  };
  
  // Configuration
const CONFIG = {
  columnMapping: {
    'NR. REJ.': ['NR. REJ.', 'ImportNrRejestracyjny', 'Nr rejestracyjny'],
    'IMPORTKODPOZYCJI': ['IMPORTKODPOZYCJI', 'Importkodpozycji'],
    'STAWKAVAT': ['STAWKAVAT', 'Stawka vat'],
    'IMPORTKODPRODUKTU': ['IMPORTKODPRODUKTU', 'Produkt', 'Grupa prod'],
    'NETTO': ['NETTO', 'Wartość netto', 'Wartość netto fak'],
    'VAT': ['VAT', 'Wartość vat fak'],
    'StanLicznika': ['StanLicznika', 'Licznik'],
    'DataTransakcji': ['Data realizacji', 'Data transakcji', 'DataTransakcji'],
    'TRESC': ['TRESC', 'Dane kosztowe', 'Opis']
  },

  nrRejMapping: {
    'CB032NM': 'CMG4651A', 'CB885NL': 'CMG4649A', 'CB976NL': 'CMG4724A',
    'CB027NM': 'CMG4647A', 'CB977NL': 'CMG4728A', 'CB698NL': 'CMG4650A',
    'CB026NM': 'CMG4773A', 'CB884NL': 'CMG4729A', 'CB864NL': 'CMG4743A',
    'CB196NL': 'CMG4652A', 'CB861NL': 'CMG4732A', 'CB623NK': 'CMG4648A',
    'CB449NL': 'CMG4758A', 'CB029NM': 'CMG4754A', 'CB964NK': 'CMG4891A',
    'CB695NL': 'CMG4850A', 'CB447NL': 'CMG4757A', 'CB697NL': 'CMG4731A',
    'CB195NL': 'CMG4755A', 'CB949NL': 'CMG4759A', 'CB185NN': 'CMG4750A',
    'CB807NN': 'CMG4751A', 'CB671NN': 'CMG4748A', 'CB629NN': 'CMG4752A',
    'CB827NN': 'CMG4753A', 'CB826NN': 'CMG4746A', 'CB498NN': 'CMG4727A',
    'CB802NN': 'CMG4726A', 'CB499NN': 'CMG4745A', 'CB805NN': 'CMG4730A',
    'CB801NN': 'CMG4725A', 'CB184NN': 'CMG4756A', 'CB674NN': 'CMG4890A'
  },

  requiredColumns: ['NR. REJ.', '', '', 'NETTO', 'STAWKAVAT', 'VAT', 'TRESC', 'IMPORTKODPRODUKTU'],

  produktKody: {
    // Usługi
    'Obsługa techniczna': '909',
    'Normy czasowe': '903',
    'Usługa warsztatowa': '903',
    'Usługa inna': '903',
    'Usługa oponiarska': '905',
    'Usługa kurierska': '903',
    'Przechowanie opon': '905',
    'Wydanie opon z przechowalni': '905',

    // Części
    'Części do obsługi technicznej': '896',
    'Części do norm czasowych': '896',
    'Część': '896',
    'Opona letnia': '898',
    'Opona zimowa': '898',
    'Felga': '898'
  },

  produktKodyColors: {
    '896': 'bg-[#E6F3FF] text-blue-800 border-blue-200',
    '898': 'bg-[#B3FFB3] text-green-800 border-green-200',
    '903': 'bg-[#FFF3E6] text-yellow-800 border-yellow-200',
    '905': 'bg-[#E6FFE6] text-green-800 border-green-200',
    '909': 'bg-[#FFF3E6] text-red-800 border-red-200',
    '': 'bg-gray-100/50 text-gray-800 border-gray-200'
  },

  produktKodyNames: {
    '896': 'Części',
    '898': 'Opony i felgi',
    '903': 'Usługi warsztatowe',
    '905': 'Usługi oponiarskie',
    '909': 'Obsługa techniczna',
    '': 'Inne'
  },

  produktKodyIcons: {
    '896': '<i class="fas fa-cogs mr-2"></i>',
    '898': '<i class="fas fa-circle-notch mr-2"></i>',
    '903': '<i class="fas fa-tools mr-2"></i>',
    '905': '<i class="fas fa-car mr-2"></i>',
    '909': '<i class="fas fa-wrench mr-2"></i>',
    '': '<i class="fas fa-question-circle mr-2"></i>'
  }
};
  
  // Data processing
  const processData = jsonData => {
    const mappings = Object.entries(CONFIG.columnMapping);
    return jsonData.map(row => {
      const clean = {};
      
      // Column mapping
      for (const [std, poss] of mappings) {
        for (const col of poss) {
          const match = Object.keys(row).find(k => k.trim().toUpperCase() === col.trim().toUpperCase());
          if (match) { 
            clean[std] = row[match]; 
            break; 
          }
        }
      }
      
      // Registration number mapping
      if (clean['NR. REJ.']) {
        clean['NR. REJ.'] = mapRegistrationNumber(clean['NR. REJ.']);
      }
      
      // Calculations
      const netto = parseFloat(clean.NETTO) || 0;
      const vat = parseFloat(clean.VAT) || 0;
      clean.BRUTTO = (netto + vat).toFixed(2);
      clean.PRODUKTKOD = CONFIG.produktKody[clean.IMPORTKODPRODUKTU || ''] || '';
      
      // Date formatting
      if (clean.DataTransakcji) {
        clean.DataTransakcji = formatDateToYYYYMMDD(clean.DataTransakcji);
      }
      
      return clean;
    });
  };
  
  const calculateSummaries = (data, groupBy = 'IMPORTKODPRODUKTU') => {
    const summary = { totalNetto: 0, totalVAT: 0, totalBrutto: 0, productGroups: {} };
    
    for (const row of data) {
      const netto = parseFloat(row.NETTO) || 0;
      const vat = parseFloat(row.VAT) || 0;
      const brutto = netto + vat;
      
      const key = row[groupBy] || 'Nieznany';
      const prodCode = groupBy === 'IMPORTKODPRODUKTU'
        ? (CONFIG.produktKody[key] || '')
        : (CONFIG.produktKody[row.IMPORTKODPRODUKTU] || '');
      
      summary.totalNetto += netto;
      summary.totalVAT += vat;
      summary.totalBrutto += brutto;
      
      if (!summary.productGroups[key]) {
        summary.productGroups[key] = { 
          netto: 0, vat: 0, brutto: 0, count: 0, details: [], code: prodCode 
        };
      }
      
      const group = summary.productGroups[key];
      group.netto += netto;
      group.vat += vat;
      group.brutto += brutto;
      group.count++;
      group.details.push({
        tresc: row.TRESC || '',
        importNr: row['NR. REJ.'] || '',
        importKodPozycji: row['IMPORTKODPOZYCJI'] || '',
        importKodProduktu: row.IMPORTKODPRODUKTU || '',
        produktKod: prodCode,
        netto, vat, brutto,
        stawkaVAT: row.STAWKAVAT || '',
        DataTransakcji: row.DataTransakcji || '',
        StanLicznika: row.StanLicznika || ''
      });
    }
    
    return summary;
  };
  
  // UI Functions
  const renderGroupRows = (details, start, count) => {
    return details.slice(start, start + count).map(d =>
      `<tr class="hover:bg-gray-50 dark:hover:bg-gray-600">
         <td class="px-3 py-0.5 text-sm">${d.importNr}</td>
         <td class="px-3 py-0.5 text-sm">${(d.tresc || '').replace(/[^a-zA-Z0-9\sąćęłńóśźżĄĆĘŁŃÓŚŹŻ]/g, '')}</td>
         <td class="px-3 py-0.5 text-sm">${d.stawkaVAT}</td>
         <td class="px-3 py-0.5 text-sm">${formatNumber(d.netto)}</td>
         <td class="px-3 py-0.5 text-sm">${formatAmount(d.brutto)}</td>
         <td class="px-3 py-0.5 text-sm">${d.DataTransakcji || ''}</td>
         <td class="px-3 py-0.5 text-sm">${d.StanLicznika || ''}</td>
       </tr>`
    ).join('');
  };
  
  const updateSummaryUI = summary => {
    $('#totalNetto').text(formatAmount(summary.totalNetto));
    $('#totalVAT').text(formatAmount(summary.totalVAT));
    $('#totalBrutto').text(formatAmount(summary.totalBrutto));
    updateProductGroupsUI(summary);
    updateCharts(calculateSummaries(state.data, 'IMPORTKODPRODUKTU'));
    updateFileCountBadge();
  };
  
  const updateProductGroupsUI = summary => {
    const container = $('#productGroupsSummary').empty();
    const search = $('#groupSearch').val().toLowerCase();
    const sorted = Object.entries(summary.productGroups).sort((a, b) => b[1].netto - a[1].netto);
    
    let visible = 0;
    const frag = document.createDocumentFragment();
    
    sorted.forEach(([name, grp], i) => {
      if (search && !name.toLowerCase().includes(search) && 
          !grp.details.some(d => d.tresc.toLowerCase().includes(search))) return;
      
      visible++;
      const code = grp.code || '';
      const color = CONFIG.produktKodyColors[code] || CONFIG.produktKodyColors[''];
      const textColor = getTextColorClass(code);
      const icon = CONFIG.produktKodyIcons[code] || CONFIG.produktKodyIcons[''];
      const pretty = name || 'Nieznany';
      const codeDisplay = code ? ` <span class="product-code">${code}</span>` : '';
      const percentage = ((grp.netto / summary.totalNetto) * 100).toFixed(1);
      const tbodyId = `group-${i}-tbody`;
      
      const groupHTML = `
        <div class="group-container mb-2" id="group-${i}">
          <div class="group-header flex justify-between items-center p-3 rounded-lg border ${color} transition duration-200 cursor-pointer" data-group-id="group-${i}">
            <div class="flex-1">
              <div class="flex items-center">
                ${icon}
                <span class="font-medium">${pretty}${codeDisplay}</span>
                <span class="ml-2 badge bg-white/50 text-gray-700 dark:text-blue-300 mr-2">${grp.count} ${grp.count === 1 ? 'pozycja' : 'pozycji'}</span>
              </div>
            </div>
            <div class="text-right flex items-center gap-2">
              <div>
                <div class="text-xs sm:text-sm font-medium">${formatNumber(grp.netto)}</div>
                <div class="text-[10px] sm:text-xs opacity-70">${percentage}% całości</div>
              </div>
              <div class="text-gray-500 dark:text-gray-400 ml-1">
                <i class="fas fa-chevron-down transition-transform duration-300"></i>
              </div>
            </div>
          </div>
          <div class="group-details ${textColor} bg-white/50 dark:bg-gray-800/50 rounded-b-lg border p-3 mb-2 hidden">
            <div class="grid grid-cols-3 md:grid-cols-3 gap-2 mb-2">
              <div class="p-2 bg-white dark:bg-gray-700 rounded shadow-sm">
                <div class="text-xs ${textColor}">Netto</div>
                <div class="font-semibold ${textColor}">${formatAmount(grp.netto)}</div>
              </div>
              <div class="p-2 bg-white dark:bg-gray-700 rounded shadow-sm">
                <div class="text-xs ${textColor}">VAT</div>
                <div class="font-semibold ${textColor}">${formatAmount(grp.vat)}</div>
              </div>
              <div class="p-2 bg-white dark:bg-gray-700 rounded shadow-sm">
                <div class="text-xs ${textColor}">Brutto</div>

  const updateCharts = chartSummary => {

    } else if (['bar', 'line', 'area'].includes(chartType)) {
      chartOptions = {

  // File processing
  const processFile = file => {
    return new Promise((resolve, reject) => {
      const fileType = file.name.split('.').pop().toLowerCase();
      const reader = new FileReader();
      
      reader.onload = e => {
        try {
          let jsonData = [];
          
          if (fileType === 'csv') {
            jsonData = Papa.parse(e.target.result, { 
              header: true, 
              skipEmptyLines: true 
            }).data;
          } else if (fileType === 'xlsx' || fileType === 'xls') {
            const workbook = XLSX.read(e.target.result, { 
              type: 'binary', 
              cellDates: true 
            });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            jsonData = XLSX.utils.sheet_to_json(sheet, { raw: false });
          }
          
          const processed = processData(jsonData);
          resolve({ 
            fileName: file.name, 
            data: processed, 
            recordCount: processed.length 
          });
        } catch (err) { 
          reject(err); 
        }
      };
      
      reader.onerror = () => reject(new Error(`Błąd odczytu pliku ${file.name}`));
      
      if (fileType === 'csv') {
        reader.readAsText(file);
      } else {
        reader.readAsBinaryString(file);
      }
    });
  };
  
  const handleFiles = async files => {
    if (!files.length) return;
    
    $('#loadingSpinner').removeClass('hidden');
    
    const newFiles = Array.from(files).filter(file => 
      !state.importedFiles.some(f => f.name === file.name)
    );
    
    if(newFiles.length < files.length) {
      Array.from(files).forEach(file => {
        if(state.importedFiles.some(f => f.name === file.name)) {
          showAlert('info', `Plik ${file.name} został już zaimportowany.`);
        }
      });
    }
    
    const results = await Promise.allSettled(newFiles.map(file => processFile(file)));
    const success = [], failed = [];
    
    results.forEach((result, i) => {
      const file = newFiles[i];
      if(result.status === 'fulfilled'){
        state.importedFiles.push({ 
          name: result.value.fileName, 
          recordCount: result.value.recordCount 
        });
        state.data = [...state.data, ...result.value.data];
        success.push({ 
          name: result.value.fileName, 
          count: result.value.recordCount 
        });
      } else {
        console.error(`Error processing ${file.name}:`, result.reason);
        failed.push({ 
          name: file.name, 
          error: result.reason.message 
        });
      }
    });
    
    if (state.data.length) {
      state.summary = calculateSummaries(state.data, state.settings.groupBy);
      updateSummaryUI(state.summary);
      displayDataTable(state.data);
    }
    
    if (success.length) {
      const total = success.reduce((t, f) => t + f.count, 0),
            names = success.map(f => f.name).join(', ');
      showAlert('success', `Pomyślnie zaimportowano ${success.length} ${success.length === 1 ? 'plik' : 'pliki'} (${names}). Razem rekordów: ${total}.`);
    }
    
    if (failed.length) {
      const names = failed.map(f => f.name).join(', ');
      showAlert('error', `Nie udało się zaimportować ${failed.length} ${failed.length === 1 ? 'pliku' : 'plików'} (${names}).`);
    }
    
    $('#loadingSpinner').addClass('hidden');
  };

      : type === 'info'

  // Initialization
